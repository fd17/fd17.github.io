<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Latest Temperature</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    >
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main>
      <p class="eyebrow" id="station">Station --</p>
      <h1>Latest air temperature</h1>

      <div class="reading" aria-live="polite">
        <span id="value">--</span>
        <span id="unit">°C</span>
      </div>

      <dl>
        <dt>measured</dt>
        <dd id="measured">--</dd>
        <dt>Parameter</dt>
        <dd id="parameter">Lufttemperatur</dd>
        <dt>Coordinates</dt>
        <dd id="coordinates">--</dd>
      </dl>

      <div id="map" aria-label="Station location map"></div>
      <section class="chart-section" aria-label="Temperature curve">
        <div class="chart-header">
          <h2 id="chart-title">Past 24 hours</h2>
          <label>
            <span>Range</span>
            <select id="range-select">
              <option value="1">1 hour</option>
              <option value="6">6 hours</option>
              <option value="12">12 hours</option>
              <option value="24" selected>24 hours</option>
              <option value="48">48 hours</option>
              <option value="168">7 days</option>
              <option value="336">14 days</option>
            </select>
          </label>
        </div>
        <div class="chart-wrap">
          <canvas id="temperature-chart"></canvas>
        </div>
      </section>

      <button id="refresh" type="button">Refresh</button>
      <p id="status">Loading latest value...</p>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
